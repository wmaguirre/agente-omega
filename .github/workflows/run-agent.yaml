name: Run Agente Omega

on:
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: read   # <--- ¡NUEVA LLAVE! Permiso para leer paquetes.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # v--- ¡NUEVO PASO! Iniciar sesión en el registro de paquetes. ---v
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # ^--- Fin del nuevo paso. ---^

      - name: Run Agente Omega Job
        run: |
          docker run --rm \
            -e GITHUB_TOKEN=${{ secrets.AGENT_GITHUB_TOKEN }} \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e BRAVE_API_KEY=${{ secrets.BRAVE_API_KEY }} \
            -v ./agent.yaml:/app/agent.yaml \
            -v ./job.yaml:/app/job.yaml \
            -v ./:/app/output \
            ghcr.io/thepope/thepope:main
