name: Run Agente Omega

on:
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github-actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create SuperAGI config.yaml
        run: |
          echo "DATABASE_URL: sqlite:///app/superagi.db" > config.yaml
          echo "RUN_IN_CONTAINER: \"true\"" >> config.yaml
          # Creamos la carpeta de salida para que el agente la encuentre
          mkdir -p output

      - name: Create Agent and Goal Files
        run: |
          mkdir -p superagi_config
          echo "nombre: agente-omega" > superagi_config/agent.yaml
          echo "descripcion: Un agente de IA diseñado para realizar tareas de investigación y reporte." >> superagi_config/agent.yaml
          echo "objetivo:" >> superagi_config/agent.yaml
          echo "- Utiliza tu herramienta de búsqueda web para identificar las 5 noticias más importantes y recientes de hoy en Colombia." >> superagi_config/agent.yaml
          echo "- Para cada noticia, extrae el titular, un resumen de un párrafo y la URL." >> superagi_config/agent.yaml
          echo "- Formatea los resultados en un único archivo Markdown llamado 'reporte_noticias.md' en la carpeta /app/output." >> superagi_config/agent.yaml
          echo "herramientas:" >> superagi_config/agent.yaml
          echo "- nombre: DuckDuckGo" >> superagi_config/agent.yaml

      - name: Run SuperAGI Engine
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -v $(pwd)/config.yaml:/app/config.yaml \
            -v $(pwd)/superagi_config:/app/superagi_config \
            -v $(pwd)/output:/app/output \
            superagi/superagi:latest --config-file /app/config.yaml --agent-config-file /app/superagi_config/agent.yaml

      # v--- ¡NUEVO PASO! Subir el reporte al repositorio. ---v
      - name: Commit Report File
        run: |
          git config --global user.name 'Agente Omega'
          git config --global user.email 'agente-omega@users.noreply.github.com'
          git add output/reporte_noticias.md
          # Solo hacemos commit si hay cambios
          git diff --staged --quiet || git commit -m "Reporte de noticias generado por Agente Omega"
          git push
      # ^--- Fin del nuevo paso. ---^
